<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>KH Completionist</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<!--
    Landing page. Shows total completion across the series plus one card
    per game (progress read live from localStorage by js/kh-summary.js +
    js/landing.js). All visible text lives in lang/messages/en/index.json.
-->
<body data-page="index" data-root="./">
    <nav>
        <div class="container">
            <div class="nav-content">
                <a href="./" class="logo" id="logo-name"></a>
                <div class="nav-right">
                    <ul class="nav-links">
                    <li class="has-menu">
                        <button class="nav-menu-btn" id="games-menu-btn" type="button" aria-haspopup="true" aria-expanded="false">Games <span class="caret" aria-hidden="true">&#9662;</span></button>
                        <ul class="nav-menu" id="games-menu">
                        <li><a href="tools/kh1-tracker.html">Kingdom Hearts Final Mix</a></li>
                        <li><a href="tools/kh-com-tracker.html">Re:Chain of Memories</a></li>
                        <li><a href="tools/kh2-tracker.html">Kingdom Hearts II</a></li>
                        <li class="has-submenu">
                            <a href="tools/kh-bbs-tracker.html">Birth by Sleep <span class="caret" aria-hidden="true">&#9656;</span></a>
                            <ul class="nav-submenu">
                                <li><a href="tools/kh-melding.html">Melding Calculator</a></li>
                            </ul>
                        </li>
                        <li><a href="tools/kh-ddd-tracker.html">Dream Drop Distance</a></li>
                        <li><a href="tools/kh02-tracker.html">Kingdom Hearts 0.2</a></li>
                        <li><a href="tools/kh3-tracker.html">Kingdom Hearts III</a></li>
                        </ul>
                    </li>
                    </ul>
                    <div class="theme-toggle">
                        <button id="themeToggle" class="theme-btn" type="button">
                            <span class="theme-icon" id="theme-icon" aria-hidden="true"></span>
                            <span class="theme-text" id="theme-text"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="project-hero landing-hero">
            <figure class="banner landing-banner"><img class="banner-img" src="images/banners/series.jpg" alt=""></figure>
        </section>

        <main class="main-content">
            <section class="section">
                <h2 id="lg-total-label"></h2>
                <!-- Series progress bar, built by js/landing.js -->
                <div id="series-total" class="series-total"></div>
            </section>

            <section class="section">
                <h2 id="lg-games-label"></h2>
                <!-- HD-collection groups, each with its hero strip and the
                     games' banner cards, built by js/landing.js -->
                <div id="collections"></div>
            </section>
        </main>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/kh-common.js"></script>
    <script src="js/kh1-tracker-data.js"></script>
    <script src="js/kh-com-tracker-data.js"></script>
    <script src="js/kh2-tracker-data.js"></script>
    <script src="js/kh-ddd-tracker-data.js"></script>
    <script src="js/kh02-tracker-data.js"></script>
    <script src="js/kh3-tracker-data.js"></script>
    <script src="js/kh-bbs-tracker-data.js"></script>
    <script src="js/kh-summary.js"></script>
    <script src="js/landing.js"></script>
    <script src="js/banners.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
