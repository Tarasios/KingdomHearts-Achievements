<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>Syncing Kingdom Hearts progress…</title>
    <style>
        body { margin:0; min-height:100vh; display:grid; place-items:center;
               background:#10131a; color:#e8e8ea; font:15px/1.5 system-ui, sans-serif; }
        .box { text-align:center; padding:1.5rem; max-width:30rem; }
        .box h1 { font-size:1.1rem; margin:0 0 .5rem; }
        .box p { margin:.25rem 0; opacity:.8; }
    </style>
</head>
<!--
    Sync bridge. Opened in a pop-up by the partner site's "Sync" button so it
    can read THIS origin's localStorage (a first-party context) and exchange
    progress via postMessage. All logic lives in js/kh-sync.js, which runs its
    bridge role because of the data-kh-bridge flag below, then closes this
    window. Standalone page — loads nothing from the rest of the site.
-->
<body data-kh-bridge="1" data-root="./">
    <div class="box">
        <h1>Syncing your Kingdom Hearts progress…</h1>
        <p>This window will close automatically.</p>
    </div>
    <script src="js/kh-sync.js"></script>
</body>
</html>
