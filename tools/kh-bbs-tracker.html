<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>Birth By Sleep — Achievement Tracker</title>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/kh.css">
</head>
<body data-page="kh-bbs-tracker" data-root="/">
    <nav>
        <div class="container">
            <div class="nav-content">
                <a href="/" class="logo" id="logo-name"></a>
                <div class="nav-right">
                    <ul class="nav-links">
                        <li><a href="/" id="nav-home"></a></li>
                        <li><a href="/tools/" id="nav-tools"></a></li>
                    </ul>
                    <div class="theme-toggle">
                        <button id="themeToggle" class="theme-btn" type="button">
                            <span class="theme-icon" id="theme-icon" aria-hidden="true"></span>
                            <span class="theme-text" id="theme-text"></span>
                        </button>
                    </div>
                    <div class="language-toggle">
                        <button id="langToggle" class="lang-btn" type="button">
                            <span class="flag" id="lang-flag" aria-hidden="true"></span>
                            <span class="lang-text" id="lang-text"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container kh">
        <header class="kh-header">
            <figure class="banner kh-banner"><img class="banner-img" id="kh-banner" src="/images/banners/bbs.jpg" alt=""></figure>
            <h1 id="kh-title"></h1>
            <p class="sub" id="kh-subtitle"></p>
        </header>

        <div class="charbar" style="margin-top:12px">
            <span class="countbadge" style="margin:0" id="playing-as"></span>
            <button class="charbtn" data-c="terra"><span class="dot"></span>Terra</button>
            <button class="charbtn" data-c="ventus"><span class="dot"></span>Ventus</button>
            <button class="charbtn" data-c="aqua"><span class="dot"></span>Aqua</button>
            <span class="countbadge" id="overallNote"></span>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="trophies" id="tabbtn-trophies"></button>
            <button class="tab" data-tab="commands" id="tabbtn-commands"></button>
            <button class="tab" data-tab="unversed" id="tabbtn-unversed"></button>
            <button class="tab" data-tab="records" id="tabbtn-records"></button>
            <button class="tab" data-tab="characters" id="tabbtn-characters"></button>
            <button class="tab" data-tab="treasures" id="tabbtn-treasures"></button>
            <button class="tab" data-tab="reports" id="tabbtn-reports"></button>
            <button class="tab" data-tab="finish" id="tabbtn-finish"></button>
            <button class="tab" data-tab="icecream" id="tabbtn-icecream"></button>
            <button class="tab" data-tab="arena" id="tabbtn-arena"></button>
        </div>

        <main class="kh-main">
            <!-- Panel contents are rendered by js/kh-bbs-tracker.js -->
            <section id="tab-trophies" class="card"></section>
            <section id="tab-commands" class="card" style="display:none"></section>
            <section id="tab-unversed" class="card" style="display:none"></section>
            <section id="tab-records" class="card" style="display:none"></section>
            <section id="tab-characters" class="card" style="display:none"></section>
            <section id="tab-treasures" class="card" style="display:none"></section>
            <section id="tab-reports" class="card" style="display:none"></section>
            <section id="tab-finish" class="card" style="display:none"></section>
            <section id="tab-icecream" class="card" style="display:none"></section>
            <section id="tab-arena" class="card" style="display:none"></section>
        </main>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/kh-bbs-tracker-data.js"></script>
    <script src="/js/kh-bbs-tracker.js"></script>
    <script src="/js/kh-progress.js"></script>
    <script src="/js/banners.js"></script>
</body>
</html>
